name: Build and Deploy

on:
  push:
    branches: [main]
  workflow_dispatch: {}

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: techcombank-rag-chatbot

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r tests/requirements-test.txt

      - name: Run unit tests
        run: pytest

  # Split into separate jobs so a failure/retry in a later stage (e.g. a
  # missing IAM permission during the Lambda apply) doesn't force redoing
  # the slow Docker build+push step too. "Re-run failed jobs" in the GitHub
  # UI only reruns jobs that didn't succeed, so this alone saves a lot of
  # time during iterative debugging.

  terraform-ecr:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-skip-session-tagging: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply (ECR repo + pull policy only)
        working-directory: infra
        run: |
          terraform apply -auto-approve \
            -target=aws_ecr_repository.app \
            -target=aws_ecr_repository_policy.app \
            -var="image_tag=${{ github.sha }}"

  build-and-push:
    needs: terraform-ecr
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-skip-session-tagging: true

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
        run: |
          docker build -t $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }} .
          docker push $REGISTRY/${{ env.ECR_REPOSITORY }}:${{ github.sha }}

  terraform-deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          role-skip-session-tagging: true

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.5"

      - name: Terraform init
        working-directory: infra
        run: terraform init

      - name: Terraform apply (full deploy)
        working-directory: infra
        run: terraform apply -auto-approve -var="image_tag=${{ github.sha }}"

      - name: Print deployed API URL
        working-directory: infra
        run: terraform output api_url
